apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: employee-management-ingress
  namespace: employee-management
  labels:
    app.kubernetes.io/name: employee-management
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: employee-management.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: employee-management-service
                port:
                  name: http
