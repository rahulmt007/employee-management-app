apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-management-app
  namespace: employee-management
  labels:
    app.kubernetes.io/name: employee-management
    app.kubernetes.io/component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: employee-management
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: employee-management
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: app
          image: employee-management-app:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          envFrom:
            - configMapRef:
                name: employee-app-config
            - secretRef:
                name: employee-db-secret
          readinessProbe:
            httpGet:
              path: /healthcheck.php
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthcheck.php
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
