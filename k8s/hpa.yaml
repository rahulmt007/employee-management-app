apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: employee-management-hpa
  namespace: employee-management
  labels:
    app.kubernetes.io/name: employee-management
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: employee-management-app
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
