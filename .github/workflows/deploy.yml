name: Employee Management Deployment

on:
  push:
    branches:
      - main
      - refactor/v2-enterprise-pipeline
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  S3_BUCKET: rahulmt007-employee-management-artifacts
  ASG_NAME: capstone-asg
  APPLICATION_NAME: EmployeeManagement

jobs:
  build:
    name: Build Deployment Artifact
    runs-on: ubuntu-latest

    outputs:
      artifact_name: ${{ steps.package.outputs.artifact_name }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip jq

      - name: Validate Repository
        shell: bash
        run: |
          set -Eeuo pipefail

          test -d app
          test -d scripts

          test -f app/index.php
          test -f app/healthcheck.php

          test -f scripts/bootstrap.sh
          test -f scripts/common.sh
          test -f scripts/deploy.sh
          test -f scripts/backup.sh
          test -f scripts/rollback.sh
          test -f scripts/verify_deployment.sh
          test -f scripts/prune_releases.sh

          bash -n scripts/bootstrap.sh
          bash -n scripts/common.sh
          bash -n scripts/deploy.sh
          bash -n scripts/backup.sh
          bash -n scripts/rollback.sh
          bash -n scripts/verify_deployment.sh
          bash -n scripts/prune_releases.sh

          echo "Repository validation successful."

      - name: Generate Version Metadata
        id: version
        shell: bash
        run: |
          set -Eeuo pipefail

          VERSION=$(date +%Y%m%d-%H%M%S)
          SHORT_SHA=$(git rev-parse --short HEAD)
          ARTIFACT_NAME="${APPLICATION_NAME}-${VERSION}-${SHORT_SHA}.zip"

          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
          echo "$VERSION" > VERSION

          cat > manifest.json <<EOF
          {
            "application": "${APPLICATION_NAME}",
            "commit": "${GITHUB_SHA}",
            "branch": "${GITHUB_REF_NAME}",
            "build_time": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "artifact": "${ARTIFACT_NAME}"
          }
          EOF

      - name: Package Deployment Artifact
        id: package
        shell: bash
        run: |
          set -Eeuo pipefail

          ARTIFACT="${{ steps.version.outputs.artifact_name }}"

          zip -r "$ARTIFACT" \
            app \
            scripts \
            VERSION \
            manifest.json

          echo "artifact_name=$ARTIFACT" >> "$GITHUB_OUTPUT"

          unzip -l "$ARTIFACT"

      - name: Upload GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-artifact
          path: ${{ steps.package.outputs.artifact_name }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Upload Artifact to S3
        shell: bash
        run: |
          set -Eeuo pipefail

          aws s3 cp \
            "${{ steps.package.outputs.artifact_name }}" \
            "s3://${{ env.S3_BUCKET }}/${{ steps.package.outputs.artifact_name }}"

          echo "Uploaded: s3://${{ env.S3_BUCKET }}/${{ steps.package.outputs.artifact_name }}"

  deploy:
    name: Deploy to Auto Scaling Group
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Deployment Information
        shell: bash
        run: |
          echo "Application : ${{ env.APPLICATION_NAME }}"
          echo "Region      : ${{ env.AWS_REGION }}"
          echo "S3 Bucket   : ${{ env.S3_BUCKET }}"
          echo "ASG         : ${{ env.ASG_NAME }}"
          echo "Artifact    : ${{ needs.build.outputs.artifact_name }}"

      - name: Discover ASG Instances
        id: discover
        shell: bash
        run: |
          set -Eeuo pipefail

          INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "${{ env.ASG_NAME }}" \
            --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService'].InstanceId" \
            --output text)

          INSTANCE_IDS=$(echo "$INSTANCE_IDS" | xargs)

          if [[ -z "$INSTANCE_IDS" || "$INSTANCE_IDS" == "None" ]]; then
            echo "No InService instances found in ASG."
            exit 1
          fi

          echo "Target instances:"
          for ID in $INSTANCE_IDS; do
            echo " - $ID"
          done

          echo "instance_ids=$INSTANCE_IDS" >> "$GITHUB_OUTPUT"

      - name: Verify SSM Connectivity
        shell: bash
        run: |
          set -Eeuo pipefail

          for ID in ${{ steps.discover.outputs.instance_ids }}; do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$ID" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text)

            echo "$ID SSM status: $STATUS"

            if [[ "$STATUS" != "Online" ]]; then
              echo "Instance $ID is not Online in SSM."
              exit 1
            fi
          done

      - name: Create SSM Deployment Parameters
        shell: bash
        run: |
          set -Eeuo pipefail

          ARTIFACT="${{ needs.build.outputs.artifact_name }}"

          jq -n \
            --arg bucket "${{ env.S3_BUCKET }}" \
            --arg artifact "$ARTIFACT" \
            --arg sha "${{ github.sha }}" \
            --arg dbhost "${{ secrets.DB_HOST }}" \
            --arg dbuser "${{ secrets.DB_USER }}" \
            --arg dbpass "${{ secrets.DB_PASS }}" \
            --arg dbname "${{ secrets.DB_NAME }}" \
            --arg authuser "${{ secrets.AUTH_ADMIN_USER }}" \
            --arg authpass "${{ secrets.AUTH_ADMIN_PASS }}" \
            '{
              commands: [
                "set -Eeuo pipefail",
                "WORKDIR=$(mktemp -d /tmp/employee-deployment-XXXXXX)",
                "cd \"$WORKDIR\"",
                "echo Downloading deployment artifact...",
                ("aws s3 cp \"s3://" + $bucket + "/" + $artifact + "\" deployment.zip"),
                "echo Extracting deployment artifact...",
                "unzip -oq deployment.zip",
                "chmod +x scripts/*.sh",
                ("export S3_BUCKET=\"" + $bucket + "\""),
                ("export ARTIFACT_NAME=\"" + $artifact + "\""),
                ("export GITHUB_SHA=\"" + $sha + "\""),
                ("export DB_HOST=\"" + $dbhost + "\""),
                ("export DB_USER=\"" + $dbuser + "\""),
                ("export DB_PASS=\"" + $dbpass + "\""),
                ("export DB_NAME=\"" + $dbname + "\""),
                ("export AUTH_ADMIN_USER=\"" + $authuser + "\""),
                ("export AUTH_ADMIN_PASS=\"" + $authpass + "\""),
                "bash scripts/bootstrap.sh"
              ]
            }' > ssm-parameters.json

          echo "SSM parameters created."

      - name: Deploy Application
        id: deploy
        shell: bash
        run: |
          set -Eeuo pipefail

          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --comment "Employee Management Deployment v3.2" \
            --instance-ids ${{ steps.discover.outputs.instance_ids }} \
            --parameters file://ssm-parameters.json \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"
          echo "SSM Command ID: $COMMAND_ID"

      - name: Wait For Deployment
        shell: bash
        run: |
          set +e

          COMMAND_ID="${{ steps.deploy.outputs.command_id }}"

          for ID in ${{ steps.discover.outputs.instance_ids }}; do
            echo "Waiting for deployment on $ID"

            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$ID"

            echo "Wait completed for $ID"
          done

      - name: Collect Deployment Results
        shell: bash
        run: |
          set -Eeuo pipefail

          COMMAND_ID="${{ steps.deploy.outputs.command_id }}"
          FAILED=0

          for ID in ${{ steps.discover.outputs.instance_ids }}; do
            echo ""
            echo "=================================================="
            echo "Instance: $ID"
            echo "=================================================="

            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$ID" \
              --query Status \
              --output text)

            RESPONSE_CODE=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$ID" \
              --query ResponseCode \
              --output text)

            echo "Status: $STATUS"
            echo "ResponseCode: $RESPONSE_CODE"

            echo ""
            echo "STDOUT:"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$ID" \
              --query StandardOutputContent \
              --output text

            echo ""
            echo "STDERR:"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$ID" \
              --query StandardErrorContent \
              --output text

            if [[ "$STATUS" != "Success" ]]; then
              FAILED=1
            fi
          done

          if [[ "$FAILED" -eq 1 ]]; then
            echo "One or more deployments failed."
            exit 1
          fi

          echo "Deployment completed successfully on all instances."
