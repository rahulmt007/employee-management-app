name: Employee Management Deployment

on:
  push:
    branches:
      - main
      - refactor/v2-enterprise-pipeline
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  S3_BUCKET: rahulmt007-employee-management-artifacts
  ASG_NAME: capstone-asg
  APPLICATION_NAME: EmployeeManagement

jobs:
  build:
    name: Build Deployment Artifact
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.package.outputs.artifact_name }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip jq

      - name: Validate Repository
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "Repository root:"
          pwd
          echo ""
          echo "Repository contents:"
          ls -la

          test -d app
          test -d scripts
          test -f app/index.php
          test -f app/healthcheck.php
          test -f app/sql/database.sql
          test -f scripts/bootstrap.sh
          test -f scripts/common.sh
          test -f scripts/deploy.sh
          test -f scripts/backup.sh
          test -f scripts/rollback.sh
          test -f scripts/verify_deployment.sh
          test -f scripts/prune_releases.sh

          bash -n scripts/bootstrap.sh
          bash -n scripts/common.sh
          bash -n scripts/deploy.sh
          bash -n scripts/backup.sh
          bash -n scripts/rollback.sh
          bash -n scripts/verify_deployment.sh
          bash -n scripts/prune_releases.sh

          echo "Repository validation passed."

      - name: Generate Build Metadata
        id: metadata
        shell: bash
        run: |
          set -Eeuo pipefail

          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
          SHORT_SHA=$(git rev-parse --short HEAD)
          ARTIFACT_NAME="${APPLICATION_NAME}-${TIMESTAMP}-${SHORT_SHA}.zip"

          echo "timestamp=$TIMESTAMP" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"

          echo "Artifact: $ARTIFACT_NAME"

      - name: Prepare Deployment Package
        shell: bash
        run: |
          set -Eeuo pipefail

          rm -rf build
          mkdir -p build

          cp -R app build/
          cp -R scripts build/

          chmod +x build/scripts/*.sh

          cat > build/VERSION <<EOF
          Application: ${APPLICATION_NAME}
          Commit: ${GITHUB_SHA}
          ShortCommit: ${{ steps.metadata.outputs.short_sha }}
          Branch: ${GITHUB_REF_NAME}
          BuildTimeUTC: ${{ steps.metadata.outputs.timestamp }}
          EOF

          cat > build/manifest.json <<EOF
          {
            "application": "${APPLICATION_NAME}",
            "artifact": "${{ steps.metadata.outputs.artifact_name }}",
            "commit": "${GITHUB_SHA}",
            "short_commit": "${{ steps.metadata.outputs.short_sha }}",
            "branch": "${GITHUB_REF_NAME}",
            "workflow": "${GITHUB_WORKFLOW}",
            "run_number": "${GITHUB_RUN_NUMBER}",
            "build_time_utc": "${{ steps.metadata.outputs.timestamp }}"
          }
          EOF

          echo "Build directory contents:"
          find build -maxdepth 3 -type f | sort

      - name: Package Deployment Artifact
        id: package
        shell: bash
        run: |
          set -Eeuo pipefail

          ARTIFACT="${{ steps.metadata.outputs.artifact_name }}"

          cd build
          zip -rq "../$ARTIFACT" .
          cd ..

          echo "artifact_name=$ARTIFACT" >> "$GITHUB_OUTPUT"
          ls -lh "$ARTIFACT"

      - name: Verify Deployment Artifact
        shell: bash
        run: |
          set -Eeuo pipefail
          unzip -l "${{ steps.package.outputs.artifact_name }}"

      - name: Upload GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-artifact
          path: ${{ steps.package.outputs.artifact_name }}
          if-no-files-found: error

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Upload Artifact to S3
        shell: bash
        run: |
          set -Eeuo pipefail

          aws s3 cp \
            "${{ steps.package.outputs.artifact_name }}" \
            "s3://${S3_BUCKET}/${{ steps.package.outputs.artifact_name }}"

          aws s3 ls "s3://${S3_BUCKET}/${{ steps.package.outputs.artifact_name }}"

  deploy:
    name: Deploy to Auto Scaling Group
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Install Runtime Tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Display Deployment Information
        shell: bash
        run: |
          echo "Application : ${APPLICATION_NAME}"
          echo "Region      : ${AWS_REGION}"
          echo "S3 Bucket   : ${S3_BUCKET}"
          echo "ASG         : ${ASG_NAME}"
          echo "Artifact    : ${{ needs.build.outputs.artifact_name }}"

      - name: Discover ASG Instances
        id: discover
        shell: bash
        run: |
          set -Eeuo pipefail

          INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "${ASG_NAME}" \
            --query 'AutoScalingGroups[0].Instances[].InstanceId' \
            --output text)

          INSTANCE_IDS=$(echo "$INSTANCE_IDS" | xargs)

          if [[ -z "$INSTANCE_IDS" || "$INSTANCE_IDS" == "None" ]]; then
            echo "ERROR: No instances found in ASG: ${ASG_NAME}"
            exit 1
          fi

          echo "Discovered instances:"
          for INSTANCE_ID in $INSTANCE_IDS; do
            echo " - $INSTANCE_ID"
          done

          echo "instance_ids=$INSTANCE_IDS" >> "$GITHUB_OUTPUT"

      - name: Verify SSM Connectivity
        shell: bash
        run: |
          set -Eeuo pipefail

          for INSTANCE_ID in ${{ steps.discover.outputs.instance_ids }}; do
            echo "Checking SSM connectivity for $INSTANCE_ID"

            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query 'InstanceInformationList[0].PingStatus' \
              --output text)

            echo "PingStatus: $STATUS"

            if [[ "$STATUS" != "Online" ]]; then
              echo "ERROR: $INSTANCE_ID is not Online in Systems Manager."
              exit 1
            fi
          done

      - name: Create SSM Parameters
        id: ssm_params
        shell: bash
        run: |
          set -Eeuo pipefail

          ARTIFACT_NAME="${{ needs.build.outputs.artifact_name }}"

          jq -n \
            --arg bucket "$S3_BUCKET" \
            --arg artifact "$ARTIFACT_NAME" \
            --arg sha "$GITHUB_SHA" \
            '{commands: [
              "set -Eeuo pipefail",
              "WORKDIR=$(mktemp -d /tmp/employee-deploy-XXXXXX)",
              "cd \"$WORKDIR\"",
              "echo Downloading deployment artifact...",
              ("aws s3 cp \"s3://" + $bucket + "/" + $artifact + "\" deployment.zip"),
              "echo Extracting deployment artifact...",
              "unzip -oq deployment.zip",
              "chmod +x scripts/*.sh",
              ("export S3_BUCKET=\"" + $bucket + "\""),
              ("export ARTIFACT_NAME=\"" + $artifact + "\""),
              ("export GITHUB_SHA=\"" + $sha + "\""),
              "bash scripts/bootstrap.sh"
            ]}' > ssm-parameters.json

          echo "SSM parameters:"
          cat ssm-parameters.json

      - name: Deploy Application
        id: deploy
        shell: bash
        run: |
          set -Eeuo pipefail

          INSTANCE_IDS="${{ steps.discover.outputs.instance_ids }}"

          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --comment "EmployeeManagement Deployment - ${{ needs.build.outputs.artifact_name }}" \
            --instance-ids $INSTANCE_IDS \
            --parameters file://ssm-parameters.json \
            --query 'Command.CommandId' \
            --output text)

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"
          echo "SSM Command ID: $COMMAND_ID"

      - name: Wait For Deployment
        shell: bash
        run: |
          set +e

          COMMAND_ID="${{ steps.deploy.outputs.command_id }}"

          for INSTANCE_ID in ${{ steps.discover.outputs.instance_ids }}; do
            echo "Waiting for deployment on $INSTANCE_ID"

            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID"

            echo "Wait completed for $INSTANCE_ID with exit code $?"
          done

          exit 0

      - name: Collect Deployment Results
        shell: bash
        run: |
          set -Eeuo pipefail

          COMMAND_ID="${{ steps.deploy.outputs.command_id }}"
          FAILED=0

          for INSTANCE_ID in ${{ steps.discover.outputs.instance_ids }}; do
            echo ""
            echo "============================================================"
            echo "INSTANCE: $INSTANCE_ID"
            echo "============================================================"

            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' \
              --output text)

            RESPONSE_CODE=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'ResponseCode' \
              --output text)

            STDOUT=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'StandardOutputContent' \
              --output text)

            STDERR=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'StandardErrorContent' \
              --output text)

            echo "Status       : $STATUS"
            echo "ResponseCode : $RESPONSE_CODE"
            echo ""
            echo "---------------- STDOUT ----------------"
            echo "$STDOUT"
            echo ""
            echo "---------------- STDERR ----------------"
            echo "$STDERR"

            if [[ "$STATUS" != "Success" ]]; then
              FAILED=1
            fi
          done

          echo "FAILED=$FAILED" >> "$GITHUB_ENV"

      - name: Deployment Summary
        shell: bash
        run: |
          echo ""
          echo "============================================================"
          echo "Deployment Summary"
          echo "============================================================"
          echo "Application : ${APPLICATION_NAME}"
          echo "Region      : ${AWS_REGION}"
          echo "ASG         : ${ASG_NAME}"
          echo "Artifact    : ${{ needs.build.outputs.artifact_name }}"
          echo "Command ID  : ${{ steps.deploy.outputs.command_id }}"
          echo "Instances   : ${{ steps.discover.outputs.instance_ids }}"
          echo ""

          if [[ "${FAILED:-1}" == "1" ]]; then
            echo "Deployment FAILED."
            exit 1
          fi

          echo "Deployment SUCCESSFUL."
