name: Build Deployment Artifact

on:
  push:
    branches:
      - refactor/v2-enterprise-pipeline

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate Repository Structure
        run: |
          test -f index.php
          test -f healthcheck.php
          test -d scripts
          test -d assets
          test -d sql

      - name: Generate Build Metadata
        id: metadata
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          SHORT_SHA=$(git rev-parse --short HEAD)

          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "artifact=employee-management-${TIMESTAMP}-${SHORT_SHA}.zip" >> $GITHUB_OUTPUT

      - name: Build Deployment Artifact
        run: |
          zip -r \
          "${{ steps.metadata.outputs.artifact }}" \
          . \
          -x ".git/*" \
             ".github/*" \
             "docs/*" \
             "screenshots/*"

      - name: Verify Artifact
        run: |
          unzip -l "${{ steps.metadata.outputs.artifact }}"

      - name: Upload Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: ${{ steps.metadata.outputs.artifact }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload Artifact to S3
        run: |
          aws s3 cp \
            "${{ steps.metadata.outputs.artifact }}" \
            "s3://${{ secrets.S3_BUCKET_NAME }}/${{ steps.metadata.outputs.artifact }}"

      - name: Verify Upload
        run: |
          aws s3 ls \
            "s3://${{ secrets.S3_BUCKET_NAME }}/${{ steps.metadata.outputs.artifact }}"  