name: Build & Deploy Employee Management

on:
  push:
    branches:
      - refactor/v2-enterprise-pipeline

permissions:
  contents: read

jobs:

  deploy:

    runs-on: ubuntu-latest

    env:
      ASG_NAME: capstone-asg

    steps:

      #########################################################################
      # Checkout
      #########################################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      #########################################################################
      # Validate Repository
      #########################################################################

      - name: Validate Repository
        run: |
          set -e

          test -d app
          test -d scripts

          test -f app/index.php
          test -f app/healthcheck.php
          test -f app/sql/database.sql

          test -f scripts/bootstrap.sh
          test -f scripts/deploy.sh

          echo "Repository validation passed."

      #########################################################################
      # Build Metadata
      #########################################################################

      - name: Generate Build Metadata
        id: metadata
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          SHORT_SHA=$(git rev-parse --short HEAD)

          ARTIFACT="employee-management-${TIMESTAMP}-${SHORT_SHA}.zip"

          echo "artifact=$ARTIFACT" >> "$GITHUB_OUTPUT"

      #########################################################################
      # Build Artifact
      #########################################################################

      - name: Prepare Build Directory
        run: |
          mkdir build

          cp -r app build/
          cp -r scripts build/

          echo "${{ github.sha }}" > build/VERSION

          cat > build/manifest.json <<EOF
          {
            "commit":"${{ github.sha }}",
            "branch":"${{ github.ref_name }}",
            "build":"${{ github.run_number }}"
          }
          EOF

      #########################################################################
      # Package
      #########################################################################

      - name: Package Deployment Artifact
        run: |
          cd build

          zip -r \
            "../${{ steps.metadata.outputs.artifact }}" \
            .

      #########################################################################
      # Verify ZIP
      #########################################################################

      - name: Verify Artifact
        run: |
          unzip -l "${{ steps.metadata.outputs.artifact }}"

      #########################################################################
      # Upload GitHub Artifact
      #########################################################################

      - name: Upload Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: ${{ steps.metadata.outputs.artifact }}

      #########################################################################
      # AWS Login
      #########################################################################

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      #########################################################################
      # Upload to S3
      #########################################################################

      - name: Upload Artifact to S3
        run: |
          aws s3 cp \
            "${{ steps.metadata.outputs.artifact }}" \
            "s3://${{ secrets.S3_BUCKET_NAME }}/${{ steps.metadata.outputs.artifact }}"

      #########################################################################
      # Discover ASG Instances
      #########################################################################

      - name: Discover Instances
        id: discover
        run: |

          INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "$ASG_NAME" \
            --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`].InstanceId' \
            --output text)

          echo "Instances:"
          echo "$INSTANCE_IDS"

          if [ -z "$INSTANCE_IDS" ]; then
            echo "No running instances found."
            exit 1
          fi

          echo "instance_ids=$INSTANCE_IDS" >> $GITHUB_OUTPUT

      #########################################################################
      # Send SSM Command
      #########################################################################

      - name: Deploy via SSM
        id: deploy
        run: |

          COMMAND_ID=$(aws ssm send-command \
            --document-name AWS-RunShellScript \
            --instance-ids ${{ steps.discover.outputs.instance_ids }} \
            --comment "Employee Management Deployment" \
            --parameters commands="[
              \"export S3_BUCKET='${{ secrets.S3_BUCKET_NAME }}'\",
              \"export ARTIFACT_NAME='${{ steps.metadata.outputs.artifact }}'\",
              \"export GITHUB_SHA='${{ github.sha }}'\",
              \"bash /opt/employee-app/scripts/bootstrap.sh\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

          echo "Command ID: $COMMAND_ID"

      #########################################################################
      # Wait
      #########################################################################

      - name: Wait For Deployment
        run: |

          aws ssm wait command-executed \
            --command-id "${{ steps.deploy.outputs.command_id }}" \
            --instance-id $(echo "${{ steps.discover.outputs.instance_ids }}" | awk '{print $1}')

      #########################################################################
      # Deployment Results
      #########################################################################

      - name: Show Deployment Results
        run: |

          aws ssm list-command-invocations \
            --command-id "${{ steps.deploy.outputs.command_id }}" \
            --details \
            --output table